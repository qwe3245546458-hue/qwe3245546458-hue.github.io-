
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XUEXI | 个人主页</title>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism2.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }
    body {
      background: #0d1117;
      color: #e6edf3;
      padding: 40px 20px;
      line-height: 1.7;
      position: relative;
      overflow-x: hidden;
    }
    /* 粒子背景容器 */
    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #388bfd;
      margin-bottom: 20px;
      transition: 0.3s ease;
    }
    .avatar:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #388bfd60;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 8px;
    }
    .typing {
      color: #8b949e;
      font-size: 18px;
      margin-bottom: 30px;
      min-height: 26px;
    }
    .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .links a {
      padding: 10px 18px;
      background: #222731;
      border-radius: 8px;
      color: #e6edf3;
      text-decoration: none;
      transition: 0.2s;
    }
    .links a:hover {
      background: #388bfd;
      transform: translateY(-2px);
    }
    .section {
      text-align: left;
      background: #161b22cc;
      backdrop-filter: blur(6px);
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid #30363d;
      transition: 0.2s;
    }
    .section:hover {
      border-color: #58a6ff;
    }
    .section h2 {
      margin-bottom: 16px;
      color: #58a6ff;
    }
    .footer {
      margin-top: 50px;
      color: #6e7681;
      font-size: 14px;
    }
    .visitor {
      margin: 10px 0 30px;
      color: #8b949e;
    }
    .live2d-widget {
      position: fixed;
      right: 18px;
      bottom: 12px;
      z-index: 1;
      width: min(240px, 28vw);
      min-width: 180px;
      height: min(360px, 50vh);
      pointer-events: none;
    }
    .live2d-widget canvas {
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }
    .live2d-status {
      position: fixed;
      right: 18px;
      bottom: 60px;
      z-index: 6;
      max-width: 230px;
      padding: 10px 12px;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #161b22e6;
      color: #c9d1d9;
      font-size: 13px;
      line-height: 1.5;
      text-align: left;
      box-shadow: 0 10px 28px #00000055;
      pointer-events: auto;
    }
    @media (max-width: 760px) {
      .live2d-widget {
        width: 180px;
        min-width: 180px;
        height: 280px;
        right: 8px;
        bottom: 8px;
      }
      .live2d-status {
        max-width: 170px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- 粒子背景 -->
  <div id="particles-js"></div>

  <div class="live2d-widget" id="live2dWidget" aria-label="Live2D 看板娘">
    <canvas id="live2dCanvas"></canvas>
  </div>
  <div class="live2d-status" id="live2dStatus">
    xiaomai Live2D 模型加载中...
  </div>

  <div class="container">
    <img class="avatar" src="./aa2830e2d8bc414fd26b58489ee53519.jpeg" alt="头像">

    <h1>XUEXI</h1>
    <!-- 打字机效果 -->
    <div class="typing" id="typeText"></div>

    <!-- 访客统计 -->
    <div class="visitor">
      👀 访问人数：<img src="https://visitor-badge.laobi.icu/badge?page_id=qwe3245546458-hue.github.io" alt="访客统计">
    </div>

    <div class="links">
      <a href="https://github.com/qwe3245546458-hue">GitHub主页</a>
      <a href="mailto:xxx@xxx.com">联系邮箱</a>
    </div>

    <div class="section">
      <h2>👋 关于我</h2>
      <p>热爱计算机与编程，专注学习C语言、Python、前端开发与网络安全相关知识，喜欢动手做项目，不断提升技术能力。</p>
    </div>

    <div class="section">
      <h2>💻 技能栈</h2>
      <p>C语言 · Python · HTML/CSS · Git · Linux · 计算机网络基础</p>
    </div>

    <div class="section">
      <h2>📂 我的项目</h2>
      <p>• 后续会更新个人项目，敬请期待</p>
    </div>

    <div class="footer">
      © 2025 XUEXI · Powered by GitHub Pages
    </div>
  </div>

  <script>
    // 1. 粒子背景配置
    particlesJS("particles-js", {
      particles: {
        number: { value: 80, density: { enable: true, value_area: 800 } },
        color: { value: "#58a6ff" },
        shape: { type: "circle" },
        opacity: { value: 0.5, random: true },
        size: { value: 3, random: true },
        line_linked: { enable: true, distance: 150, color: "#58a6ff", opacity: 0.2, width: 1 },
        move: { enable: true, speed: 1, direction: "none", random: true, straight: false, out_mode: "out" }
      },
      interactivity: {
        detect_on: "canvas",
        events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: true, mode: "push" } }
      }
    });

    // 2. 打字机动画
    const textArr = [
      "编程爱好者｜计算机专业学生",
      "专注 C语言 · Python · 网络安全",
      "持续学习，持续进步✨"
    ];
    let textIndex = 0;
    let charIndex = 0;
    const el = document.getElementById("typeText");
    function typeWrite() {
      if (charIndex < textArr[textIndex].length) {
        el.innerHTML = textArr[textIndex].substring(0, charIndex+1)+"<span>|</span>";
        charIndex++;
        setTimeout(typeWrite, 80);
      } else {
        setTimeout(()=>{
          textIndex = (textIndex+1) % textArr.length;
          charIndex = 0;
          typeWrite();
        }, 2000);
      }
    }
    typeWrite();

    // 3. Live2D 看板娘
    const live2dConfig = {
      modelPath: "./assets/live2d/xiaomai/xiaomai.model.json",
      width: 280,
      height: 430
    };

    const live2dWidget = document.getElementById("live2dWidget");
    const live2dCanvas = document.getElementById("live2dCanvas");
    const live2dStatus = document.getElementById("live2dStatus");

    async function initLive2D() {
      if (window.location.protocol === "file:") {
        live2dStatus.textContent =
          "Live2D 不能直接用文件方式预览。请运行 start-local-server.bat，然后打开 http://127.0.0.1:5500/ 查看。";
        return;
      }

      if (!window.PIXI || !window.PIXI.live2d || !window.PIXI.live2d.Live2DModel) {
        live2dStatus.textContent = "Live2D 运行库加载失败，请检查网络或 CDN 访问。";
        return;
      }

      try {
        const app = new PIXI.Application({
          view: live2dCanvas,
          width: live2dConfig.width,
          height: live2dConfig.height,
          transparent: true,
          autoDensity: true,
          antialias: true,
          resolution: Math.min(window.devicePixelRatio || 1, 2)
        });

        const model = await PIXI.live2d.Live2DModel.from(live2dConfig.modelPath);
        app.stage.addChild(model);

        const scale = Math.min(
          live2dConfig.width / model.width,
          live2dConfig.height / model.height
        ) * 0.95;
        model.scale.set(scale);
        model.x = (live2dConfig.width - model.width) / 2;
        model.y = live2dConfig.height - model.height;

        live2dWidget.classList.add("is-loaded");
        live2dStatus.style.display = "none";
      } catch (error) {
        console.error("Live2D load failed:", error);
        live2dStatus.textContent =
          "xiaomai 模型加载失败：请用 http://127.0.0.1:5500/ 或 GitHub Pages 访问，并确认 assets/live2d/xiaomai 文件夹完整。";
      }
    }

    window.addEventListener("load", initLive2D);
  </script>
</body>
</html>
